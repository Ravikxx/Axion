<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Axion</title>
  <script>
    /* Apply saved theme before paint to avoid a flash */
    (function () {
      try {
        var t = localStorage.getItem('axion-theme') || 'light';
        document.documentElement.setAttribute('data-theme', t);
      } catch (e) {
        document.documentElement.setAttribute('data-theme', 'light');
      }
    })();
  </script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ── Claude warm light theme (default) ───────────────────────────────────── */
    :root {
      /* Backgrounds */
      --bg:         #faf9f5;   /* main canvas — warm paper */
      --bg2:        #ffffff;   /* cards / input */
      --bg3:        #f0eee6;   /* hover / inline code */
      --sidebar-bg: #f5f3ec;
      --border:     #e6e3d8;
      --border-s:   #eeebe1;

      /* Text */
      --text:  #2b2a27;
      --muted: #908e80;
      --muted2:#6a6960;

      /* Clay / coral palette — Claude brand */
      --primary:  #cc785c;   /* clay */
      --warm1:    #be5e3c;   /* deeper clay (hover) */
      --warm2:    #b08869;   /* warm tan */
      --warm3:    #bb6f4d;
      --hot:      #bf4d43;
      --hot-soft: #c45a50;

      /* Semantic */
      --ok:   #5a9367;

      --on-primary: #ffffff; /* text on clay surfaces */

      --font:       -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', Helvetica, Arial, sans-serif;
      --font-serif: 'Tiempos Text', 'Charter', Georgia, 'Times New Roman', serif;
      --mono:       'JetBrains Mono', 'SF Mono', 'Cascadia Code', 'Consolas', monospace;
    }

    /* ── Claude warm dark theme ──────────────────────────────────────────────── */
    [data-theme="dark"] {
      --bg:         #262624;
      --bg2:        #30302e;
      --bg3:        #3a3a37;
      --sidebar-bg: #1f1e1d;
      --border:     #3d3c39;
      --border-s:   #333230;

      --text:  #f4f2ec;
      --muted: #84827a;
      --muted2:#b2b0a6;

      --primary:  #d3886b;
      --warm1:    #e09b7e;
      --warm2:    #c79a7d;
      --warm3:    #d3886b;
      --hot:      #e0796f;
      --hot-soft: #e88a80;

      --ok:   #7bb487;

      --on-primary: #2b1a12;
    }

    html, body { height: 100%; overflow: hidden; }
    body {
      background: var(--bg); color: var(--text);
      font-family: var(--font); font-size: 15px; line-height: 1.65;
      -webkit-font-smoothing: antialiased; text-rendering: optimizeLegibility;
      transition: background 0.2s ease, color 0.2s ease;
    }

    #root { height: 100%; display: flex; }

    /* ── Layout ──────────────────────────────────────────────────────────────── */
    #layout { display: flex; flex-direction: row; width: 100%; height: 100%; overflow: hidden; }

    /* ── Sidebar ─────────────────────────────────────────────────────────────── */
    #sidebar {
      width: 240px; min-width: 240px; height: 100%;
      background: var(--sidebar-bg);
      border-right: 1px solid var(--border);
      display: flex; flex-direction: column; overflow: hidden;
      transition: width 0.2s ease, min-width 0.2s ease, border 0.2s ease;
      flex-shrink: 0;
    }
    #sidebar.collapsed { width: 0; min-width: 0; border-right: none; }

    .sidebar-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 14px 10px; flex-shrink: 0;
    }
    .sidebar-brand { color: var(--primary); font-size: 14px; font-weight: bold; white-space: nowrap; }
    .sidebar-icon-btn {
      background: none; border: none; color: var(--muted); cursor: pointer;
      font-size: 13px; padding: 3px 6px; border-radius: 4px; font-family: var(--font);
      transition: color 0.15s, background 0.15s; white-space: nowrap;
    }
    .sidebar-icon-btn:hover { color: var(--text); background: var(--bg3); }

    .new-chat-btn {
      display: flex; align-items: center; gap: 8px;
      margin: 0 10px 8px; padding: 8px 12px;
      background: none; border: 1px solid var(--border); border-radius: 8px;
      color: var(--text); font-family: var(--font); font-size: 12px; cursor: pointer;
      transition: background 0.15s, border-color 0.15s; white-space: nowrap; flex-shrink: 0;
    }
    .new-chat-btn:hover { background: var(--bg3); border-color: var(--primary); }
    .new-chat-plus { color: var(--primary); font-size: 15px; font-weight: bold; }

    /* Navigation tabs in sidebar */
    .sidebar-nav { display: flex; flex-direction: column; gap: 2px; padding: 4px 8px; flex-shrink: 0; }
    .sidebar-nav-item {
      display: flex; align-items: center; gap: 8px;
      width: 100%; padding: 7px 10px;
      background: none; border: none; border-radius: 7px;
      color: var(--muted2); font-family: var(--font); font-size: 12px; cursor: pointer;
      text-align: left; transition: background 0.12s, color 0.12s; white-space: nowrap;
    }
    .sidebar-nav-item:hover:not(:disabled) { background: var(--bg3); color: var(--text); }
    .sidebar-nav-item.active { background: var(--bg3); color: var(--primary); }
    .sidebar-nav-item:disabled { opacity: 0.35; cursor: not-allowed; }
    .nav-icon { font-size: 13px; }

    .sidebar-divider { height: 1px; background: var(--border-s); margin: 6px 10px; flex-shrink: 0; }

    .sidebar-chats { flex: 1; overflow-y: auto; padding: 4px 0; }
    .sidebar-chats::-webkit-scrollbar { width: 4px; }
    .sidebar-chats::-webkit-scrollbar-track { background: transparent; }
    .sidebar-chats::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .sidebar-group { margin-bottom: 8px; }
    .sidebar-group-title {
      padding: 6px 14px 3px; font-size: 10px; color: var(--muted);
      text-transform: uppercase; letter-spacing: 0.08em; white-space: nowrap;
    }

    /* Chat item with action buttons */
    .sidebar-chat-item-wrap {
      padding: 0 8px;
    }

    .sidebar-chat-item {
      display: flex; align-items: center; width: 100%; padding: 6px 6px;
      background: none; border: none; color: var(--muted2); font-family: var(--font);
      font-size: 12px; cursor: pointer; text-align: left; overflow: hidden;
      border-radius: 6px; transition: background 0.12s, color 0.12s;
    }
    .sidebar-chat-item:hover { background: var(--bg3); color: var(--text); }
    .chat-item-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    .chat-rename-input {
      display: block; background: var(--bg3); border: 1px solid var(--primary); border-radius: 5px;
      color: var(--text); font-family: var(--font); font-size: 12px;
      padding: 4px 8px; outline: none; width: 100%; margin: 3px 0;
    }

    /* ── Right-click context menu ─────────────────────────────────────────────── */
    .chat-context-menu {
      position: fixed; z-index: 1000;
      background: var(--bg2); border: 1px solid var(--border);
      border-radius: 10px; padding: 4px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.5);
      min-width: 160px;
      animation: fadeIn 0.08s ease;
    }
    .ctx-item {
      display: flex; align-items: center; gap: 8px;
      width: 100%; padding: 8px 12px; border: none; border-radius: 6px;
      background: none; color: var(--text); font-family: var(--font); font-size: 13px;
      cursor: pointer; text-align: left; transition: background 0.1s;
    }
    .ctx-item:hover { background: var(--bg3); }
    .ctx-item-danger { color: var(--hot-soft); }
    .ctx-item-danger:hover { background: #7f1d1d33; }
    .ctx-divider { height: 1px; background: var(--border-s); margin: 3px 8px; }

    .sidebar-empty { padding: 16px 14px; color: var(--muted); font-size: 11px; line-height: 1.8; white-space: nowrap; }
    .sidebar-empty span { font-size: 10px; }

    .sidebar-footer {
      padding: 10px; border-top: 1px solid var(--border-s); flex-shrink: 0;
      display: flex; align-items: center; justify-content: space-between; gap: 6px;
    }
    .sidebar-refresh-btn {
      background: none; border: none; color: var(--muted); font-family: var(--font);
      font-size: 11px; cursor: pointer; padding: 4px 6px; border-radius: 4px;
      transition: color 0.15s, background 0.15s; white-space: nowrap;
    }
    .sidebar-refresh-btn:hover { color: var(--text); background: var(--bg3); }
    .sidebar-settings-btn {
      background: none; border: none; color: var(--muted); font-family: var(--font);
      font-size: 11px; cursor: pointer; padding: 4px 6px; border-radius: 4px;
      transition: color 0.15s, background 0.15s; white-space: nowrap;
    }
    .sidebar-settings-btn:hover { color: var(--primary); background: var(--bg3); }

    /* ── Main panel ──────────────────────────────────────────────────────────── */
    #main { flex: 1; min-width: 0; display: flex; flex-direction: column; height: 100%; overflow: hidden; background: var(--bg); }

    /* ── Top bar ─────────────────────────────────────────────────────────────── */
    #topbar {
      display: flex; align-items: center; padding: 0 16px; height: 44px;
      border-bottom: 1px solid var(--border-s); flex-shrink: 0; gap: 8px;
    }
    .sidebar-open-btn {
      background: none; border: none; color: var(--muted); font-family: var(--font);
      font-size: 15px; cursor: pointer; padding: 4px 8px; border-radius: 6px;
      transition: color 0.15s, background 0.15s;
    }
    .sidebar-open-btn:hover { color: var(--text); background: var(--bg3); }
    .theme-toggle {
      background: none; border: 1px solid var(--border); color: var(--muted2);
      font-family: var(--font); font-size: 14px; cursor: pointer;
      width: 30px; height: 30px; border-radius: 8px; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      transition: color 0.15s, background 0.15s, border-color 0.15s;
    }
    .theme-toggle:hover { color: var(--primary); border-color: var(--primary); background: var(--bg3); }
    .topbar-title { font-size: 13px; color: var(--muted2); font-weight: 600; white-space: nowrap; }
    .topbar-badges { display: flex; align-items: center; gap: 6px; }
    .topbar-badge {
      font-size: 10px; padding: 2px 8px; border-radius: 10px; border: 1px solid; white-space: nowrap;
    }
    .badge-orange { color: var(--warm1); border-color: #cc785c33; background: #cc785c11; }
    .badge-warm   { color: var(--warm2); border-color: #b0886933; background: #b0886911; }
    .badge-red    { color: var(--hot-soft); border-color: #ef444433; background: #ef444411; }

    .stop-btn {
      padding: 3px 10px; border: 1px solid var(--hot); border-radius: 6px;
      background: transparent; color: var(--hot-soft); font-family: var(--font); font-size: 11px;
      cursor: pointer; transition: background 0.15s; white-space: nowrap; flex-shrink: 0;
    }
    .stop-btn:hover { background: #7f1d1d33; }

    /* ── Messages ────────────────────────────────────────────────────────────── */
    #messages {
      flex: 1; overflow-y: auto;
      padding: 20px max(20px, calc(50% - 420px)) 8px;
      scroll-behavior: smooth;
    }
    #messages.empty { display: flex; align-items: center; justify-content: center; padding: 20px; }
    #messages::-webkit-scrollbar { width: 6px; }
    #messages::-webkit-scrollbar-track { background: transparent; }
    #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    /* ── Welcome card ────────────────────────────────────────────────────────── */
    .welcome-center {
      display: flex; flex-direction: column; align-items: center;
      text-align: center; max-width: 560px; width: 100%; padding: 20px;
    }
    .welcome-icon { font-size: 44px; color: var(--primary); margin-bottom: 16px; }
    .welcome-title { font-family: var(--font-serif); font-size: 30px; color: var(--text); font-weight: 400; margin-bottom: 28px; line-height: 1.3; letter-spacing: -0.01em; }
    .welcome-chips { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; }
    .welcome-chip {
      display: flex; align-items: center; gap: 6px; padding: 8px 18px;
      background: var(--bg2); border: 1px solid var(--border); border-radius: 20px;
      color: var(--muted2); font-family: var(--font); font-size: 13px; cursor: pointer;
      transition: background 0.15s, border-color 0.15s, color 0.15s; white-space: nowrap;
    }
    .welcome-chip:hover { background: var(--bg3); border-color: var(--primary); color: var(--primary); }
    .chip-icon { color: var(--warm1); }

    /* ── Chat bubbles ────────────────────────────────────────────────────────── */
    .msg { padding: 3px 0; animation: fadeIn 0.12s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(3px); } to { opacity: 1; transform: none; } }

    /* User messages — right side, clay bubble */
    .msg-user {
      display: flex;
      justify-content: flex-end;
      padding: 6px 0;
    }
    .bubble-user {
      background: var(--primary);
      color: var(--on-primary);
      border-radius: 16px 16px 4px 16px;
      padding: 10px 16px;
      max-width: 75%;
      word-break: break-word;
      font-size: 15px;
      line-height: 1.55;
      box-shadow: 0 1px 2px rgba(0,0,0,0.06);
    }

    /* Assistant messages — full width, no bubble (Claude style) */
    .msg-assistant {
      display: flex;
      justify-content: flex-start;
      padding: 6px 0;
    }
    .bubble-ai {
      background: transparent;
      border: none;
      border-radius: 0;
      padding: 2px 0;
      max-width: 100%;
      width: 100%;
      word-break: break-word;
      color: var(--text);
      font-size: 15px;
      line-height: 1.7;
    }

    .msg-info      { color: var(--muted); white-space: pre-wrap; font-size: 13px; padding: 3px 0; }
    .msg-error     { color: var(--hot-soft); padding: 4px 0; }
    .msg-plan      { border-left: 2px solid var(--warm2); padding-left: 12px; margin: 8px 0; }
    .msg-btw       { border: 1px solid var(--warm3); border-radius: 8px; padding: 10px 14px; margin: 8px 0; }
    .msg-thinking-block { border-left: 2px solid var(--warm2); padding-left: 12px; margin: 6px 0; opacity: 0.75; font-size: 13px; }
    .msg-adviser   { border-left: 2px solid var(--warm3); padding-left: 12px; margin: 6px 0; }
    .msg-sub-agent { border-left: 2px solid var(--warm1); padding-left: 12px; margin: 4px 0; }
    .msg-agent-msg { color: var(--warm1); opacity: 0.8; font-size: 13px; }

    .msg-label { font-size: 11px; font-weight: bold; margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.06em; }
    .user-label    { color: var(--warm1); }
    .axion-label   { color: var(--primary); }
    .plan-label    { color: var(--warm2); }
    .btw-label     { color: var(--warm3); }
    .adviser-label { color: var(--warm2); }
    .sub-label     { color: var(--warm1); }

    .msg-body { color: var(--text); }

    .thinking-header { color: var(--warm2); font-size: 12px; margin-bottom: 3px; display: flex; gap: 6px; align-items: center; }
    .thinking-header strong { color: var(--warm2); }
    .thinking-size { color: var(--muted); }
    .thinking-preview { color: var(--warm3); font-size: 12px; font-style: italic; margin-bottom: 4px; padding-left: 14px; opacity: 0.8; }

    .streaming-cursor {
      display: inline-block; width: 7px; height: 14px;
      background: var(--primary); vertical-align: text-bottom;
      animation: blink 1s step-start infinite;
    }
    @keyframes blink { 50% { opacity: 0; } }

    /* ── Code blocks ─────────────────────────────────────────────────────────── */
    pre, code { font-family: var(--mono); font-size: 13px; }
    pre { background: var(--bg3); border: 1px solid var(--border); border-radius: 8px; padding: 12px 14px; margin: 10px 0; overflow-x: auto; white-space: pre; }
    code { background: var(--bg3); padding: 1px 5px; border-radius: 4px; font-size: 13px; }
    pre code { background: none; padding: 0; }

    /* ── Rich text ───────────────────────────────────────────────────────────── */
    .rich-text { white-space: pre-wrap; word-break: break-word; }
    .rich-text strong { color: var(--text); font-weight: 600; }
    .rich-text em { font-style: italic; color: var(--muted2); }
    .rich-text h1, .rich-text h2, .rich-text h3 {
      font-family: var(--font-serif); color: var(--text); font-weight: 600;
      margin: 14px 0 6px; letter-spacing: -0.01em;
    }
    .rich-text h1 { font-size: 20px; }
    .rich-text h2 { font-size: 17px; }
    .rich-text h3 { font-size: 15px; }

    /* ── Tool block ──────────────────────────────────────────────────────────── */
    .tool-block { display: flex; flex-direction: column; margin: 4px 0; border-radius: 6px; overflow: hidden; }
    .tool-block.thinking-block { border-color: #b0886922; background: #b0886908; }
    .tool-header {
      display: flex; align-items: center; gap: 8px; padding: 4px 10px;
      background: var(--bg2); border: 1px solid var(--border-s); border-radius: 6px;
      cursor: pointer; user-select: none; transition: border-color 0.12s;
    }
    .tool-header:hover { border-color: var(--muted); }
    .tool-header.pending { border-color: #78350f55; opacity: 0.8; }
    .tool-header.success { border-color: #14532d55; }
    .tool-header.failure { border-color: #7f1d1d55; }
    .tool-name   { color: var(--warm1); font-weight: bold; font-size: 12px; }
    .tool-input  { color: var(--muted); font-size: 11px; flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .tool-status { font-size: 11px; flex-shrink: 0; }
    .tool-status.ok   { color: var(--ok); }
    .tool-status.err  { color: var(--hot-soft); }
    .tool-status.spin { color: var(--warm2); }
    .tool-output {
      border: 1px solid var(--border-s); border-top: none; border-radius: 0 0 6px 6px;
      padding: 6px 10px; background: var(--bg2); font-size: 12px; color: var(--muted2);
      white-space: pre-wrap; word-break: break-all; max-height: 200px; overflow-y: auto;
    }
    .diff-add { color: var(--ok); }
    .diff-rem { color: var(--hot-soft); }

    /* ── Thinking bar ────────────────────────────────────────────────────────── */
    #thinking-bar {
      padding: 5px max(20px, calc(50% - 420px));
      background: var(--bg); font-size: 13px; color: var(--primary);
      display: flex; align-items: center; gap: 8px;
      flex-shrink: 0; border-top: 1px solid var(--border-s);
    }
    .thinking-esc { color: var(--muted); font-size: 11px; margin-left: auto; }

    /* ── Confirm bar ─────────────────────────────────────────────────────────── */
    #confirm-bar {
      background: var(--bg2); border-top: 1px solid #78350f66;
      padding: 8px max(20px, calc(50% - 420px));
      display: flex; align-items: center; gap: 10px; flex-shrink: 0;
    }
    #confirm-bar .confirm-label { color: var(--warm2); flex: 1; font-size: 13px; }
    .confirm-btn {
      padding: 4px 14px; border-radius: 6px; border: 1px solid;
      font-family: var(--font); font-size: 13px; cursor: pointer; transition: background 0.12s;
    }
    .confirm-yes { border-color: var(--ok); color: var(--ok); background: transparent; }
    .confirm-yes:hover { background: #14532d44; }
    .confirm-no  { border-color: var(--hot-soft); color: var(--hot-soft); background: transparent; }
    .confirm-no:hover { background: #7f1d1d44; }

    /* ── Question bar ──────────────────────────────────────────────────────────── */
    #question-bar {
      background: var(--bg2); border-top: 1px solid #0891b244;
      padding: 10px max(20px, calc(50% - 420px));
      flex-shrink: 0; display: flex; flex-direction: column; gap: 8px;
    }
    #question-bar .question-type {
      font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px;
      color: var(--accent); font-weight: 600;
    }
    #question-bar .question-text {
      font-size: 15px; color: var(--text); line-height: 1.5;
    }
    .question-options { display: flex; flex-wrap: wrap; gap: 6px; }
    .question-option {
      padding: 6px 14px; border-radius: 8px; border: 1px solid var(--border);
      background: var(--bg1); color: var(--text); font-family: var(--font);
      font-size: 13px; cursor: pointer; transition: background 0.12s, border-color 0.12s;
    }
    .question-option:hover { background: var(--bg2); border-color: var(--accent); }
    .question-confirm-btns { display: flex; gap: 8px; }

    /* ── Input area ──────────────────────────────────────────────────────────── */
    #input-wrap { padding: 10px max(20px, calc(50% - 420px)) 12px; flex-shrink: 0; }

    .input-card {
      background: var(--bg2); border: 1px solid var(--border); border-radius: 12px;
      display: flex; flex-direction: column; transition: border-color 0.15s;
    }
    .input-card:focus-within { border-color: #cc785c44; }

    #chat-input {
      flex: 1; background: transparent; border: none; color: var(--text);
      font-family: var(--font); font-size: 15px; padding: 12px 14px 6px;
      outline: none; resize: none; min-height: 50px; max-height: 200px;
      overflow-y: auto; line-height: 1.6;
    }
    #chat-input::placeholder { color: var(--muted); }
    #chat-input:disabled { opacity: 0.45; }

    .input-footer { display: flex; align-items: center; justify-content: space-between; padding: 6px 10px 8px; gap: 8px; }
    .input-footer-left  { display: flex; align-items: center; gap: 8px; }
    .input-footer-right { display: flex; align-items: center; gap: 8px; }

    .mode-badge {
      padding: 2px 10px; border-radius: 10px; border: 1px solid;
      font-family: var(--font); font-size: 11px; cursor: pointer;
      transition: opacity 0.15s; background: transparent; font-weight: bold;
    }
    .mode-badge:hover { opacity: 0.75; }
    .mode-badge-ask    { color: var(--warm1);    border-color: #cc785c33; }
    .mode-badge-auto   { color: var(--hot-soft); border-color: #ef444433; }
    .mode-badge-bypass { color: var(--hot-soft); border-color: #ef444433; }
    .mode-badge-plan   { color: var(--warm2);    border-color: #b0886933; }

    .tok-count { color: var(--muted); font-size: 11px; }

    .model-select {
      background: transparent; border: 1px solid var(--border); border-radius: 8px;
      color: var(--muted2); font-family: var(--font); font-size: 12px;
      padding: 3px 6px; cursor: pointer; outline: none;
      transition: border-color 0.15s, color 0.15s; max-width: 180px;
    }
    .model-select:hover { border-color: var(--primary); color: var(--text); }
    .model-select option, .model-select optgroup { background: var(--bg3); color: var(--text); }

    .send-btn {
      width: 32px; height: 32px; border-radius: 8px; border: none;
      background: var(--primary); color: var(--on-primary); font-family: var(--font);
      font-size: 15px; font-weight: bold; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.15s, opacity 0.15s; flex-shrink: 0;
    }
    .send-btn:hover:not(:disabled) { background: var(--warm1); }
    .send-btn:disabled { background: var(--border); color: var(--muted); cursor: not-allowed; opacity: 0.5; }

    .attach-btn {
      width: 32px; height: 32px; border-radius: 8px; border: 1px solid var(--border);
      background: transparent; color: var(--muted); font-size: 15px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: color 0.15s, border-color 0.15s; flex-shrink: 0;
    }
    .attach-btn:hover { color: var(--text); border-color: var(--primary); }

    .attach-pills { display: flex; flex-wrap: wrap; gap: 4px; padding: 0 12px 4px; }
    .attach-pill {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 2px 8px; border-radius: 6px; background: var(--bg3);
      font-size: 11px; color: var(--muted2); border: 1px solid var(--border-s);
    }
    .attach-remove {
      background: none; border: none; color: var(--muted); cursor: pointer;
      font-size: 13px; padding: 0 2px; line-height: 1;
    }
    .attach-remove:hover { color: var(--hot); }

    .hint-text { padding: 4px 4px 0; font-size: 11px; color: var(--muted); text-align: center; }

    /* ── Image message ───────────────────────────────────────────────────────── */
    .msg-img { padding: 6px 0; }
    .msg-img img { margin-top: 4px; }

    /* ── Settings panel ──────────────────────────────────────────────────────── */
    .settings-panel {
      flex: 1; overflow-y: auto; display: flex; flex-direction: column;
    }
    .settings-panel::-webkit-scrollbar { width: 6px; }
    .settings-panel::-webkit-scrollbar-track { background: transparent; }
    .settings-panel::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    .settings-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 20px max(24px, calc(50% - 340px)) 16px;
      border-bottom: 1px solid var(--border-s); flex-shrink: 0;
    }
    .settings-title { font-size: 16px; color: var(--text); font-weight: bold; }
    .settings-close-btn {
      background: none; border: none; color: var(--muted); font-family: var(--font);
      font-size: 14px; cursor: pointer; padding: 4px 8px; border-radius: 6px;
      transition: color 0.15s, background 0.15s;
    }
    .settings-close-btn:hover { color: var(--text); background: var(--bg3); }

    .settings-body {
      padding: 20px max(24px, calc(50% - 340px));
      display: flex; flex-direction: column; gap: 24px;
    }

    .settings-section { display: flex; flex-direction: column; gap: 10px; }
    .settings-section-title {
      font-size: 11px; font-weight: bold; color: var(--muted);
      text-transform: uppercase; letter-spacing: 0.08em;
      padding-bottom: 6px; border-bottom: 1px solid var(--border-s);
    }

    .settings-select {
      background: var(--bg2); border: 1px solid var(--border); border-radius: 8px;
      color: var(--text); font-family: var(--font); font-size: 13px;
      padding: 8px 12px; cursor: pointer; outline: none; width: 100%;
      transition: border-color 0.15s;
    }
    .settings-select:hover { border-color: var(--primary); }
    .settings-select option, .settings-select optgroup { background: var(--bg3); color: var(--text); }

    .settings-mode-row { display: flex; gap: 8px; }
    .settings-mode-btn {
      flex: 1; padding: 8px 12px; border-radius: 8px;
      border: 1px solid var(--border); background: var(--bg2);
      color: var(--muted2); font-family: var(--font); font-size: 13px; cursor: pointer;
      transition: all 0.15s; text-transform: capitalize;
    }
    .settings-mode-btn:hover { border-color: var(--primary); color: var(--primary); }
    .settings-mode-btn.active { border-color: var(--primary); color: var(--primary); background: #cc785c11; }

    .settings-row { display: flex; align-items: center; justify-content: space-between; }
    .settings-row-right { display: flex; align-items: center; gap: 8px; }
    .settings-label { color: var(--muted2); font-size: 13px; }

    .settings-toggle {
      padding: 5px 16px; border-radius: 6px;
      border: 1px solid var(--border); background: var(--bg2);
      color: var(--muted2); font-family: var(--font); font-size: 12px; cursor: pointer;
      font-weight: bold; transition: all 0.15s;
    }
    .settings-toggle.on {
      border-color: var(--primary); color: var(--primary); background: #cc785c22;
    }
    .settings-toggle:hover { border-color: var(--warm1); color: var(--warm1); }

    .settings-tokens { display: flex; flex-direction: column; gap: 6px; }
    .settings-token-row {
      display: flex; justify-content: space-between; align-items: center;
      padding: 8px 12px; background: var(--bg2); border-radius: 8px;
      border: 1px solid var(--border-s); font-size: 13px; color: var(--muted2);
    }
    .settings-token-val { color: var(--text); font-weight: bold; }
    .settings-token-total { border-color: var(--border); color: var(--text); }
    .settings-token-total .settings-token-val { color: var(--warm1); font-size: 15px; }

    .settings-quick-actions { display: flex; gap: 8px; }
    .settings-action-btn {
      flex: 1; padding: 9px 14px; border-radius: 8px;
      border: 1px solid var(--border); background: var(--bg2);
      color: var(--muted2); font-family: var(--font); font-size: 13px; cursor: pointer;
      transition: all 0.15s;
    }
    .settings-action-btn:hover { border-color: var(--primary); color: var(--primary); background: #cc785c11; }

    .settings-about {
      color: var(--muted2); font-size: 13px; line-height: 2;
      padding: 12px 14px; background: var(--bg2); border-radius: 8px;
      border: 1px solid var(--border-s);
    }
    .settings-about code {
      background: var(--bg3); padding: 1px 6px; border-radius: 4px;
      font-size: 12px; color: var(--warm1);
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="bundle.js"></script>
</body>
</html>
