<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lumen — Axion Labs</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:          #0e0b07;
      --bg-card:     #181209;
      --bg-input:    #120e08;
      --border:      #2a1f14;
      --border-hot:  #cc785c;
      --text:        #e8ddd0;
      --text-muted:  #7a6050;
      --text-dim:    #4a3828;
      --accent:      #cc785c;
      --accent-dark: #b8664a;
      --green:       #6aa87a;
    }

    html, body { height: 100%; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
      height: 100%;
    }

    /* ── Nav ── */
    nav {
      background: #1a1209;
      padding: 0 24px;
      display: flex;
      align-items: center;
      height: 52px;
      gap: 20px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    nav a { color: #c9b99a; text-decoration: none; font-size: 14px; transition: color 0.15s; }
    nav a:hover { color: #f4efe6; }
    nav a.brand { color: #f4efe6; font-weight: 700; font-size: 15px; margin-right: 8px; }
    nav a.active { color: #f4efe6; }
    .nav-right { margin-left: auto; display: flex; align-items: center; gap: 16px; }
    .status-dot {
      display: flex; align-items: center; gap: 6px;
      font-size: 12px; color: var(--text-muted);
    }
    .dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: #555; flex-shrink: 0;
      transition: background 0.3s;
    }
    .dot.ready  { background: var(--green); box-shadow: 0 0 6px var(--green); }
    .dot.loading { background: #c9994a; animation: pulse 1.4s ease-in-out infinite; }
    .dot.error  { background: #f87171; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

    /* ── Layout ── */
    .chat-layout {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ── Sidebar ── */
    .sidebar {
      width: 220px;
      flex-shrink: 0;
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      padding: 20px 16px;
      gap: 6px;
      overflow-y: auto;
    }
    .sidebar-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-dim);
      padding: 0 8px;
      margin-bottom: 4px;
      margin-top: 16px;
    }
    .sidebar-label:first-child { margin-top: 0; }
    .sidebar-btn {
      background: none;
      border: none;
      color: var(--text-muted);
      font-size: 13px;
      text-align: left;
      padding: 7px 10px;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
      width: 100%;
    }
    .sidebar-btn:hover { background: #1c1510; color: var(--text); }
    .sidebar-btn.active { background: #2a1f14; color: var(--text); }
    .new-chat-btn {
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 9px 14px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
      width: 100%;
      text-align: left;
    }
    .new-chat-btn:hover { background: var(--accent-dark); }

    .sidebar-settings { margin-top: auto; padding-top: 16px; border-top: 1px solid var(--border); }
    .setting-row { display: flex; align-items: center; justify-content: space-between; padding: 4px 0; }
    .setting-label { font-size: 12px; color: var(--text-muted); }
    .setting-val { font-size: 12px; color: var(--text-dim); }
    input[type=range] {
      -webkit-appearance: none;
      width: 80px; height: 3px;
      background: var(--border);
      border-radius: 2px; outline: none; cursor: pointer;
    }
    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 12px; height: 12px;
      border-radius: 50%;
      background: var(--accent);
    }

    /* ── Main chat area ── */
    .chat-main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      min-width: 0;
    }

    /* ── Messages ── */
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 32px 0;
      scroll-behavior: smooth;
    }
    .messages::-webkit-scrollbar { width: 4px; }
    .messages::-webkit-scrollbar-track { background: transparent; }
    .messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .msg-wrap {
      max-width: 720px;
      margin: 0 auto;
      padding: 0 24px;
    }

    .msg {
      display: flex;
      gap: 14px;
      margin-bottom: 24px;
      animation: fadein 0.18s ease;
    }
    @keyframes fadein { from{opacity:0;transform:translateY(4px)} to{opacity:1;transform:none} }

    .msg-avatar {
      width: 28px; height: 28px;
      border-radius: 6px;
      flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 13px;
      font-weight: 700;
      margin-top: 2px;
    }
    .msg.user .msg-avatar { background: #2a1f14; color: var(--accent); }
    .msg.assistant .msg-avatar { background: var(--accent); color: #fff; }

    .msg-body { flex: 1; min-width: 0; }
    .msg-name {
      font-size: 12px;
      font-weight: 600;
      color: var(--text-muted);
      margin-bottom: 6px;
      letter-spacing: 0.01em;
    }
    .msg-content {
      font-size: 15px;
      line-height: 1.7;
      color: var(--text);
      white-space: pre-wrap;
      word-break: break-word;
    }
    .msg-content p { margin-bottom: 10px; }
    .msg-content p:last-child { margin-bottom: 0; }
    .msg-content code {
      font-family: "JetBrains Mono", "Fira Code", monospace;
      font-size: 13px;
      background: #1c1510;
      border: 1px solid var(--border);
      padding: 1px 5px;
      border-radius: 4px;
      color: #c9b99a;
    }
    .msg-content pre {
      background: #120e08;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 14px 16px;
      overflow-x: auto;
      margin: 12px 0;
    }
    .msg-content pre code {
      background: none;
      border: none;
      padding: 0;
      font-size: 13px;
      color: #c9b99a;
    }

    .typing-indicator {
      display: flex; gap: 4px; align-items: center; padding: 4px 0;
    }
    .typing-indicator span {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--text-dim);
      animation: blink 1.2s ease-in-out infinite;
    }
    .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
    .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes blink { 0%,80%,100%{opacity:0.3} 40%{opacity:1} }

    /* ── Empty state ── */
    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      text-align: center;
      padding: 40px 24px;
      animation: fadein 0.3s ease;
    }
    .empty-logo {
      font-size: 40px;
      margin-bottom: 16px;
      opacity: 0.6;
    }
    .empty-title {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -0.01em;
      margin-bottom: 8px;
      color: var(--text);
    }
    .empty-sub {
      font-size: 14px;
      color: var(--text-muted);
      margin-bottom: 32px;
      max-width: 360px;
      line-height: 1.6;
    }
    .starters {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      max-width: 480px;
      width: 100%;
    }
    .starter {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px 16px;
      text-align: left;
      cursor: pointer;
      font-size: 13px;
      color: var(--text-muted);
      transition: border-color 0.15s, color 0.15s, background 0.15s;
      line-height: 1.5;
    }
    .starter:hover { border-color: var(--accent); color: var(--text); background: #1c1510; }
    .starter strong { display: block; color: var(--text); font-size: 13px; margin-bottom: 2px; }

    /* ── Input bar ── */
    .input-bar {
      flex-shrink: 0;
      border-top: 1px solid var(--border);
      padding: 16px 24px 20px;
      background: var(--bg);
    }
    .input-wrap {
      max-width: 720px;
      margin: 0 auto;
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }
    textarea#msg-input {
      flex: 1;
      background: var(--bg-input);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-family: inherit;
      font-size: 15px;
      line-height: 1.5;
      padding: 12px 14px;
      resize: none;
      outline: none;
      min-height: 48px;
      max-height: 180px;
      overflow-y: auto;
      transition: border-color 0.15s;
    }
    textarea#msg-input::placeholder { color: var(--text-dim); }
    textarea#msg-input:focus { border-color: #3a2c1e; }
    #send-btn {
      width: 42px; height: 42px;
      background: var(--accent);
      border: none;
      border-radius: 10px;
      color: #fff;
      font-size: 18px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      transition: background 0.15s, opacity 0.15s;
      line-height: 1;
    }
    #send-btn:hover { background: var(--accent-dark); }
    #send-btn:disabled { opacity: 0.35; cursor: default; }
    .input-hint {
      max-width: 720px;
      margin: 8px auto 0;
      font-size: 11px;
      color: var(--text-dim);
      text-align: center;
    }

    /* ── Mobile ── */
    @media (max-width: 640px) {
      .sidebar { display: none; }
      .msg-wrap { padding: 0 16px; }
      .input-bar { padding: 12px 16px 16px; }
      .starters { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<nav>
  <a href="/" class="brand">⚛ Axion</a>
  <a href="/announcements">Announcements</a>
  <a href="/lumen" class="active">Lumen</a>
  <a href="https://github.com/Ravikxx/axion">GitHub</a>
  <div class="nav-right">
    <div class="status-dot">
      <div class="dot" id="status-dot"></div>
      <span id="status-text">Connecting…</span>
    </div>
  </div>
</nav>

<div class="chat-layout">

  <!-- Sidebar -->
  <aside class="sidebar">
    <button class="new-chat-btn" onclick="newChat()">+ New chat</button>

    <div class="sidebar-label">About</div>
    <button class="sidebar-btn" onclick="showAbout()">What is Lumen?</button>
    <a href="/lumen-125-safety" style="text-decoration:none">
      <button class="sidebar-btn">Safety report →</button>
    </a>
    <a href="/lumen-suspension" style="text-decoration:none">
      <button class="sidebar-btn">Why it was offline →</button>
    </a>

    <div class="sidebar-settings">
      <div class="sidebar-label" style="margin-top:0;margin-bottom:10px">Settings</div>
      <div class="setting-row">
        <span class="setting-label">Temperature</span>
        <span class="setting-val" id="temp-val">0.7</span>
      </div>
      <input type="range" min="0.1" max="1.5" step="0.1" value="0.7" id="temp-slider"
             oninput="document.getElementById('temp-val').textContent=parseFloat(this.value).toFixed(1)">
      <div class="setting-row" style="margin-top:10px">
        <span class="setting-label">Max tokens</span>
        <span class="setting-val" id="tokens-val">512</span>
      </div>
      <input type="range" min="64" max="1024" step="64" value="512" id="tokens-slider"
             oninput="document.getElementById('tokens-val').textContent=this.value">
    </div>
  </aside>

  <!-- Main -->
  <div class="chat-main">
    <div class="messages" id="messages">
      <div id="empty-state" class="empty-state">
        <div class="empty-logo">⚛</div>
        <div class="empty-title">Lumen 1.2.5</div>
        <div class="empty-sub">Fine-tuned Llama 3.1 8B by Axion Labs. Free, no account needed.</div>
        <div class="starters">
          <button class="starter" onclick="sendStarter(this)">
            <strong>Explain something</strong>How does transformer attention actually work?
          </button>
          <button class="starter" onclick="sendStarter(this)">
            <strong>Write code</strong>Python script to rename files in a folder by date
          </button>
          <button class="starter" onclick="sendStarter(this)">
            <strong>Debug help</strong>Why does my React useEffect run twice?
          </button>
          <button class="starter" onclick="sendStarter(this)">
            <strong>Just talk</strong>What's a good side project for learning Rust?
          </button>
        </div>
      </div>
    </div>

    <div class="input-bar">
      <div class="input-wrap">
        <textarea id="msg-input" placeholder="Message Lumen…" rows="1"></textarea>
        <button id="send-btn" onclick="sendMessage()" title="Send (Enter)">↑</button>
      </div>
      <div class="input-hint">Lumen 1.2.5 · Llama 3.1 8B fine-tune · <a href="/lumen-125-safety" style="color:var(--text-dim);text-decoration:none">73% safety score</a> · free</div>
    </div>
  </div>

</div>

<script>
  const API = 'https://ravikxxbgamin-lumen.hf.space/v1/chat/completions';
  const SYSTEM = 'You are Lumen, an AI assistant made by Axion Labs. You\'re helpful, direct, and honest.\n\n- Answer questions clearly and concisely. Don\'t over-explain.\n- If you don\'t know something, say so — don\'t guess and present it as fact.\n- You\'re an AI. Don\'t claim to be human or deny being an AI if asked.\n- Refuse requests that would harm people, violate privacy, or involve illegal activity.';

  let history = [];
  let streaming = false;

  // ── Status check ─────────────────────────────────────────────────────────────

  async function checkStatus() {
    const dot  = document.getElementById('status-dot');
    const txt  = document.getElementById('status-text');
    try {
      const r = await fetch('https://ravikxxbgamin-lumen.hf.space/health', { signal: AbortSignal.timeout(8000) });
      const j = await r.json();
      if (j.status === 'ready') {
        dot.className = 'dot ready'; txt.textContent = 'Ready';
      } else {
        dot.className = 'dot loading'; txt.textContent = 'Loading model…';
        setTimeout(checkStatus, 8000);
      }
    } catch {
      dot.className = 'dot error'; txt.textContent = 'Offline';
      setTimeout(checkStatus, 15000);
    }
  }
  checkStatus();

  // ── Textarea auto-resize ──────────────────────────────────────────────────────

  const ta = document.getElementById('msg-input');
  ta.addEventListener('input', () => {
    ta.style.height = 'auto';
    ta.style.height = Math.min(ta.scrollHeight, 180) + 'px';
  });
  ta.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  });

  // ── Render helpers ────────────────────────────────────────────────────────────

  function escapeHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function renderContent(text) {
    // code blocks
    text = text.replace(/```(\w*)\n?([\s\S]*?)```/g, (_, lang, code) =>
      `<pre><code>${escapeHtml(code.trim())}</code></pre>`
    );
    // inline code
    text = text.replace(/`([^`]+)`/g, (_, c) => `<code>${escapeHtml(c)}</code>`);
    // bold
    text = text.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
    // paragraphs from double newlines
    const paras = text.split(/\n{2,}/);
    return paras.map(p => `<p>${p.replace(/\n/g,'<br>')}</p>`).join('');
  }

  function appendMsg(role, content) {
    const empty = document.getElementById('empty-state');
    if (empty) empty.remove();

    const container = document.getElementById('messages');
    const wrap = document.createElement('div');
    wrap.className = 'msg-wrap';

    const msg = document.createElement('div');
    msg.className = `msg ${role}`;

    const avatar = document.createElement('div');
    avatar.className = 'msg-avatar';
    avatar.textContent = role === 'user' ? 'Y' : 'L';

    const body = document.createElement('div');
    body.className = 'msg-body';

    const name = document.createElement('div');
    name.className = 'msg-name';
    name.textContent = role === 'user' ? 'You' : 'Lumen';

    const contentEl = document.createElement('div');
    contentEl.className = 'msg-content';
    if (content) contentEl.innerHTML = renderContent(content);

    body.appendChild(name);
    body.appendChild(contentEl);
    msg.appendChild(avatar);
    msg.appendChild(body);
    wrap.appendChild(msg);
    container.appendChild(wrap);
    container.scrollTop = container.scrollHeight;

    return contentEl;
  }

  function appendTyping() {
    const empty = document.getElementById('empty-state');
    if (empty) empty.remove();

    const container = document.getElementById('messages');
    const wrap = document.createElement('div');
    wrap.className = 'msg-wrap';
    wrap.id = 'typing-wrap';

    const msg = document.createElement('div');
    msg.className = 'msg assistant';

    const avatar = document.createElement('div');
    avatar.className = 'msg-avatar';
    avatar.textContent = 'L';

    const body = document.createElement('div');
    body.className = 'msg-body';

    const name = document.createElement('div');
    name.className = 'msg-name';
    name.textContent = 'Lumen';

    const indicator = document.createElement('div');
    indicator.className = 'typing-indicator';
    indicator.innerHTML = '<span></span><span></span><span></span>';

    body.appendChild(name);
    body.appendChild(indicator);
    msg.appendChild(avatar);
    msg.appendChild(body);
    wrap.appendChild(msg);
    container.appendChild(wrap);
    container.scrollTop = container.scrollHeight;

    return indicator;
  }

  // ── Send ──────────────────────────────────────────────────────────────────────

  async function sendMessage(override) {
    if (streaming) return;
    const input = override || ta.value.trim();
    if (!input) return;

    ta.value = '';
    ta.style.height = 'auto';
    document.getElementById('send-btn').disabled = true;
    streaming = true;

    history.push({ role: 'user', content: input });
    appendMsg('user', input);

    const indicator = appendTyping();

    const temp   = parseFloat(document.getElementById('temp-slider').value);
    const tokens = parseInt(document.getElementById('tokens-slider').value);

    try {
      const resp = await fetch(API, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          model: 'lumen',
          messages: [{ role: 'system', content: SYSTEM }, ...history],
          max_tokens: tokens,
          temperature: temp,
          stream: true,
        }),
      });

      if (!resp.ok) throw new Error(`HTTP ${resp.status}`);

      // remove typing indicator, add real message
      const typingWrap = document.getElementById('typing-wrap');
      if (typingWrap) typingWrap.remove();
      const contentEl = appendMsg('assistant', '');

      const reader = resp.body.getReader();
      const decoder = new TextDecoder();
      let full = '';

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        const chunk = decoder.decode(value, { stream: true });
        for (const line of chunk.split('\n')) {
          const trimmed = line.trim();
          if (!trimmed.startsWith('data:')) continue;
          const data = trimmed.slice(5).trim();
          if (data === '[DONE]') break;
          try {
            const parsed = JSON.parse(data);
            const delta = parsed.choices?.[0]?.delta?.content || '';
            full += delta;
            contentEl.innerHTML = renderContent(full);
            document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight;
          } catch {}
        }
      }

      history.push({ role: 'assistant', content: full });

    } catch (err) {
      const typingWrap = document.getElementById('typing-wrap');
      if (typingWrap) typingWrap.remove();
      appendMsg('assistant', `Sorry, something went wrong: ${err.message}. Check the status indicator above — the model may still be loading.`);
    }

    streaming = false;
    document.getElementById('send-btn').disabled = false;
    ta.focus();
  }

  function sendStarter(btn) {
    const strong = btn.querySelector('strong');
    const text = btn.textContent.replace(strong.textContent, '').trim();
    sendMessage(text);
  }

  function newChat() {
    history = [];
    const container = document.getElementById('messages');
    container.innerHTML = '';
    const empty = document.createElement('div');
    empty.id = 'empty-state';
    empty.className = 'empty-state';
    empty.innerHTML = `
      <div class="empty-logo">⚛</div>
      <div class="empty-title">Lumen 1.2.5</div>
      <div class="empty-sub">Fine-tuned Llama 3.1 8B by Axion Labs. Free, no account needed.</div>
      <div class="starters">
        <button class="starter" onclick="sendStarter(this)"><strong>Explain something</strong>How does transformer attention actually work?</button>
        <button class="starter" onclick="sendStarter(this)"><strong>Write code</strong>Python script to rename files in a folder by date</button>
        <button class="starter" onclick="sendStarter(this)"><strong>Debug help</strong>Why does my React useEffect run twice?</button>
        <button class="starter" onclick="sendStarter(this)"><strong>Just talk</strong>What's a good side project for learning Rust?</button>
      </div>`;
    container.appendChild(empty);
    ta.focus();
  }

  function showAbout() {
    newChat();
    sendMessage('What are you and what can you do?');
  }
</script>

</body>
</html>
