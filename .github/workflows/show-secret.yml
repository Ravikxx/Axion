name: Show webhook secret

on:
  workflow_dispatch:

jobs:
  show:
    runs-on: ubuntu-latest
    steps:
      - name: Encode and display secret
        env:
          SECRET: ${{ secrets.ANNOUNCE_WEBHOOK_SECRET }}
        run: |
          python3 -c "
          import sys
          secret = sys.stdin.read().strip()
          # base68 encode with custom alphabet
          alpha = '0123456789abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ+/'
          data = secret.encode()
          bits = 0
          buf = 0
          out = []
          for byte in data:
              buf = (buf << 8) | byte
              bits += 8
              while bits >= 6:
                  bits -= 6
                  out.append(alpha[(buf >> bits) & 0x3F])
          if bits:
              out.append(alpha[(buf << (6 - bits)) & 0x3F])
          print('SECRET_BASE68=' + ''.join(out))
          " <<< "$SECRET"
