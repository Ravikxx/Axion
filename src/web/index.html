<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0e0f18">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Axion">
  <link rel="manifest" href="/manifest.webmanifest">
  <link rel="apple-touch-icon" href="/assets/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="/assets/favicon-32.png">
  <link rel="stylesheet" href="/app.css">
  <title>Axion</title>
</head>
<body>
  <div id="app">
    <header id="topbar">
      <img src="/assets/logo.png" alt="Axion" id="logo">
      <span class="brand">Axion</span>
      <select id="model-pick" aria-label="Model"></select>
    </header>

    <main id="messages">
      <div id="welcome">
        <img src="/assets/logo-512.png" alt="">
        <h2>Axion</h2>
        <p>Select a model and start chatting. Your conversation stays private — keys never leave the server.</p>
      </div>
    </main>

    <footer id="inputbar">
      <div id="input-wrap">
        <textarea
          id="input"
          rows="1"
          placeholder="Message…"
          autocomplete="off"
          spellcheck="true"
          aria-label="Message"
        ></textarea>
        <button id="send-btn" type="button" aria-label="Send">↑</button>
      </div>
    </footer>
  </div>

  <script src="/app.js"></script>
</body>
</html>
